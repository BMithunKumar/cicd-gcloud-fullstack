name: Smoke Tests

on:
  pull_request:
    branches:
      - master         # ← only PRs targeting main
    paths:
      - 'frontend/**'
      - 'backend/**'
jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check backend health
        run: curl --fail https://backend-953548187364.us-west1.run.app//health   # your backend URL

      - name: Check frontend loads
        run: curl --fail http://34.160.65.69/index.html       # your frontend URL

      - name: Post result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const success = '${{ job.status }}' === 'success';
            const msg = success
              ? '✅ Smoke tests passed — frontend and backend are live.'
              : '❌ Smoke tests failed — check the Actions tab.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: msg
            })